{% load i18n %}
<div class="module yp-filter yp-filter-range yp-filter-date-range">
  <h3>{% blocktranslate with filter_title=title %}By {{ filter_title }}{% endblocktranslate %}</h3>
  {% for choice in choices %}
    <label>
      {% translate "From" %}
      <input type="{{ choice.input_type }}"
             name="{{ choice.param_gte }}"
             value="{{ choice.value_gte }}"
             {% include "admin/yp_admin/_htmx_filter_attrs.html" %}>
    </label>
    <label>
      {% translate "To" %}
      <input type="{{ choice.input_type }}"
             name="{{ choice.param_lte }}"
             value="{{ choice.value_lte }}"
             {% include "admin/yp_admin/_htmx_filter_attrs.html" %}>
    </label>
    {% for k, v in choice.preserved.items %}
      <input type="hidden" name="{{ k }}" value="{{ v }}">
    {% endfor %}
  {% endfor %}
</div>
